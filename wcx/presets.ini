; Glimpse WCX presets
;
; Each [section] is one preset. Enabled presets show up as virtual files
; inside the archive; extracting one runs ffmpeg with the given Args.
;
; Variables in OutputName and Args:
;   %basename% - source filename without path or extension
;   %name%     - preset section name (the [section] header)
;   %ext%      - source extension, lowercased, without the dot
; Path separators in OutputName: '/' or '\' (used to nest the entry inside
; subfolders within the archive).
;
; Forbidden in Args: -i, -y, -n, pipe:0/1/2 (the plugin manages input and
; output internally).

; ============================================================================
; Audio
; ============================================================================

[audio_mp3]
Enabled=1
Description=MP3 audio rip (LAME VBR ~190 kbps)
OutputExt=mp3
OutputName=audio/%basename%
Args=-vn -c:a libmp3lame -q:a 4

[audio_wav]
Enabled=1
Description=Lossless PCM WAV audio rip
OutputExt=wav
OutputName=audio/%basename%
Args=-vn -c:a pcm_s16le

; ============================================================================
; Images
; ============================================================================

[image_poster]
Enabled=1
Description=JPEG poster frame at 00:00:05
OutputExt=jpg
OutputName=image/%basename%_poster
Args=-ss 00:00:05 -frames:v 1 -q:v 2

[image_thumbstrip]
Enabled=1
Description=5x1 thumbnail strip, 1 frame every 10 seconds, 240px wide
OutputExt=jpg
OutputName=image/%basename%_thumbs
Args=-vf fps=1/10,scale=240:-1,tile=5x1 -frames:v 1 -q:v 2

[image_gif]
Enabled=1
Description=3-second animated GIF preview, 320px wide, 15 fps
OutputExt=gif
OutputName=image/%basename%_preview
Args=-t 3 -vf fps=15,scale=320:-1:flags=lanczos

; ============================================================================
; Clips
; ============================================================================

[clip_first10s]
Enabled=1
Description=First 10 seconds, stream copy (no re-encode)
OutputExt=mp4
OutputName=clip/%basename%_first10s
Args=-t 10 -c copy

[clip_preview480]
Enabled=1
Description=480p H.264 preview re-encode
OutputExt=mp4
OutputName=clip/%basename%_preview480
Args=-vf scale=-2:480 -c:v libx264 -preset medium -crf 28 -c:a aac -b:a 96k

[clip_mute]
Enabled=1
Description=Original video with audio stripped, stream copy
OutputExt=mp4
OutputName=clip/%basename%_mute
Args=-an -c:v copy

; ============================================================================
; Subtitles
; ============================================================================

[subs_srt]
Enabled=0
Description=First subtitle track as SRT (requires source with a subtitle stream)
OutputExt=srt
OutputName=subs/%basename%
Args=-map 0:s:0 -c:s srt
